server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/rcab.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rcab.example/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    return 308 https://app.rcab.example$request_uri;
}
