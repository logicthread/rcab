name: rcab-dev

# All build contexts and bind mounts are relative to the repo root.
# Run via: pnpm dev:up   (which invokes docker compose with --env-file .env.dev)

services:
  postgres:
    build:
      context: ./postgres
    networks: [rcab_dev_net]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rcab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rcab}
      POSTGRES_DB: ${POSTGRES_DB:-rcab}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-rcab} -d $${POSTGRES_DB:-rcab}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks: [rcab_dev_net]
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s
    restart: unless-stopped

  # One-shot: downloads the OSM PBF if not present in the osrm-data volume.
  # Uses alpine + curl because the official osrm/osrm-backend image is based
  # on Debian Stretch (EOL) and apt cannot install curl in it any more.
  osrm-prep:
    image: alpine:3.19
    networks: [rcab_dev_net]
    environment:
      OSM_PBF_URL: ${OSM_PBF_URL:-https://download.geofabrik.de/asia/india/north-eastern-zone-latest.osm.pbf}
    volumes:
      - osrm-data:/data
    command: >
      sh -c '
        set -eu
        apk add --no-cache curl
        cd /data
        if [ ! -f region.osm.pbf ]; then
          echo "[osrm-prep] downloading PBF from $$OSM_PBF_URL"
          curl -fL --output region.osm.pbf "$$OSM_PBF_URL"
        else
          echo "[osrm-prep] PBF already present"
        fi
      '
    restart: "no"

  # One-shot: extracts + partitions + customizes the OSRM graph.
  # Skipped if region.osrm.mldgr already exists.
  osrm-extract:
    image: osrm/osrm-backend:latest
    networks: [rcab_dev_net]
    volumes:
      - osrm-data:/data
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        set -e;
        cd /data;
        if [ ! -f region.osrm.mldgr ]; then
          echo "[osrm-extract] extracting";
          osrm-extract -p /opt/car.lua region.osm.pbf;
          echo "[osrm-extract] partitioning";
          osrm-partition region.osrm;
          echo "[osrm-extract] customizing";
          osrm-customize region.osrm;
        else
          echo "[osrm-extract] osrm graph already present";
        fi
    depends_on:
      osrm-prep:
        condition: service_completed_successfully
    restart: "no"

  # Serves the OSRM HTTP API.
  osrm:
    image: osrm/osrm-backend:latest
    networks: [rcab_dev_net]
    volumes:
      - osrm-data:/data
    command: ["osrm-routed", "--algorithm", "mld", "--port", "5000", "/data/region.osrm"]
    depends_on:
      osrm-extract:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api/Dockerfile.dev
    networks: [rcab_dev_net]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-rcab}:${POSTGRES_PASSWORD:-rcab}@postgres:5432/${POSTGRES_DB:-rcab}
      REDIS_URL: redis://redis:6379
      OSRM_URL: http://osrm:5000
    volumes:
      - ../../apps/api:/workspace/apps/api
      - ../../packages/shared/src:/workspace/packages/shared/src
      - ../../packages/api-client/src:/workspace/packages/api-client/src
      # Anonymous volumes preserve the image's installed node_modules across bind mounts.
      - /workspace/node_modules
      - /workspace/apps/api/node_modules
      - /workspace/packages/shared/node_modules
      - /workspace/packages/api-client/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/v1/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web/Dockerfile.dev
    networks: [rcab_dev_net]
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
    volumes:
      - ../../apps/web:/workspace/apps/web
      - ../../packages/shared/src:/workspace/packages/shared/src
      - ../../packages/api-client/src:/workspace/packages/api-client/src
      - /workspace/node_modules
      - /workspace/apps/web/node_modules
      - /workspace/apps/web/.next
      - /workspace/packages/shared/node_modules
      - /workspace/packages/api-client/node_modules
    restart: unless-stopped

  # --- Observability (profile: obs) ---

  loki:
    image: grafana/loki:3.0.0
    networks: [rcab_dev_net]
    volumes:
      - loki-data:/loki
      - ../../infra/observability/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    profiles: [obs]
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    networks: [rcab_dev_net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../infra/observability/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]
    profiles: [obs]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    networks: [rcab_dev_net]
    ports:
      - "9090:9090"
    volumes:
      - prom-data:/prometheus
      - ../../infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infra/observability/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      api:
        condition: service_healthy
    profiles: [obs]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    networks: [rcab_dev_net]
    volumes:
      - ../../infra/observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    profiles: [obs]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    networks: [rcab_dev_net]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus, loki]
    profiles: [obs]
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    networks: [rcab_dev_net]
    ports:
      - "3003:3001"
    volumes:
      - uptime-kuma-data:/app/data
    depends_on:
      api:
        condition: service_healthy
    profiles: [obs]
    restart: unless-stopped

networks:
  rcab_dev_net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  osrm-data:
  loki-data:
  prom-data:
  grafana-data:
  uptime-kuma-data:
