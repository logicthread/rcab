name: Deploy

on:
  push:
    branches:
      - main
      - 'release/**'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/rcab/api:${{ github.sha }}
            ghcr.io/rcab/api:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/rcab/web:${{ github.sha }}
            ghcr.io/rcab/web:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-push
    environment: staging
    steps:
      - name: SSH deploy to staging VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/rcab/compose
            IMAGE_TAG=${{ needs.build-push.outputs.image_tag }} docker compose pull
            IMAGE_TAG=${{ needs.build-push.outputs.image_tag }} docker compose up -d
            bash /opt/rcab/scripts/prod-smoke.sh
