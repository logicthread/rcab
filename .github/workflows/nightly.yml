name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run e2e tests
        run: pnpm test:e2e
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}

  load:
    name: Load tests (k6)
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run load tests
        run: pnpm test:load
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [e2e, load]
    if: ${{ needs.e2e.result == 'failure' || needs.load.result == 'failure' }}
    steps:
      - name: Report nightly failure
        run: |
          echo "Nightly run failed — e2e: ${{ needs.e2e.result }}, load: ${{ needs.load.result }}"
          echo "TODO: open Linear issue via Linear API (RCAB-E1.S5 stub)"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
