name: driver_app
description: rcab driver app — Phase-0 Android client
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # DI + state
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3+1

  # Realtime (Socket.IO v4)
  socket_io_client: ^2.0.3+1

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  firebase_messaging: ^14.9.4

  # Background location (foreground service)
  flutter_foreground_task: ^6.1.3

  # Location
  geolocator: ^11.0.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Misc
  url_launcher: ^6.3.0
  flutter_secure_storage: ^9.2.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
